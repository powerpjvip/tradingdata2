<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna Markets Hub</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #0e0e0e; color: #ddd; }
        h1 { color: gold; text-align: center; }
        .last-updated { text-align: center; margin-bottom: 20px; color: #aaa; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .card h3 { margin: 0 0 10px; display: flex; align-items: center; gap: 10px; }
        .price { font-size: 1.4em; font-weight: bold; }
        .chg.positive { color: #4caf50; }
        .chg.negative { color: #f44336; }
        .pcr { padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .pcr.bull { background: #1b5e20; color: white; }
        .pcr.bear { background: #b71c1c; color: white; }
        .pcr.neutral { background: #ff8f00; color: white; }
        .macd { display: flex; gap: 15px; font-size: 0.9em; margin: 10px 0; }
        .chart-container { width: 100%; height: 200px; margin-top: 10px; }
    </style>
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.0.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <h1>🕉️ Krishna Markets Intelligence Hub</h1>
    <div class="last-updated" id="lastUpdated">Loading...</div>
    <div class="grid" id="cards"></div>

    <script>
        async function loadData() {
            const res = await fetch('data.json');
            const json = await res.json();
            document.getElementById('lastUpdated').innerText = `Last Updated: ${new Date(json.updated).toLocaleString()}`;

            const container = document.getElementById('cards');
            container.innerHTML = '';

            for (const [key, value] of Object.entries(json.data)) {
                const card = document.createElement('div');
                card.className = 'card';

                // Header
                const header = document.createElement('h3');
                header.innerHTML = `${key} <span class="price">${value.price}</span> <span class="chg ${value.chgPct >= 0 ? 'positive' : 'negative'}">(${value.chgPct > 0 ? '+' : ''}${value.chgPct}%)</span>`;
                card.appendChild(header);

                // PCR (if available)
                if (value.pcr !== undefined && value.pcr !== null) {
                    const pcrDiv = document.createElement('div');
                    let pcrClass = 'neutral';
                    let pcrText = 'Neutral';
                    if (value.pcr < 0.7) { pcrClass = 'bull'; pcrText = 'Bullish'; }
                    else if (value.pcr > 1.2) { pcrClass = 'bear'; pcrText = 'Bearish'; }
                    pcrDiv.innerHTML = `PCR: <span class="pcr ${pcrClass}">${value.pcr} (${pcrText})</span>`;
                    card.appendChild(pcrDiv);
                }

                // MACD
                if (value.macd) {
                    const macdDiv = document.createElement('div');
                    macdDiv.className = 'macd';
                    macdDiv.innerHTML = `
                        <span>MACD: ${value.macd.macd}</span>
                        <span>Signal: ${value.macd.signal}</span>
                        <span>Hist: <span style="color:${value.macd.histogram >=0 ? '#4caf50' : '#f44336'}">${value.macd.histogram}</span></span>
                    `;
                    card.appendChild(macdDiv);
                }

                // Chart container
                const chartDiv = document.createElement('div');
                chartDiv.className = 'chart-container';
                chartDiv.id = `chart-${key}`;
                card.appendChild(chartDiv);
                container.appendChild(card);

                // Render chart if history exists
                if (value.history && value.history.length > 0) {
                    const chart = LightweightCharts.createChart(chartDiv, {
                        width: chartDiv.clientWidth,
                        height: 200,
                        layout: { textColor: '#d1d4dc', backgroundColor: '#1e1e1e' },
                        grid: { vertLines: { color: '#2b2b2b' }, horzLines: { color: '#2b2b2b' } },
                        timeScale: { timeVisible: true, borderColor: '#2b2b2b' },
                    });
                    const candlestickSeries = chart.addCandlestickSeries({
                        upColor: '#4caf50', downColor: '#f44336', borderVisible: false,
                        wickUpColor: '#4caf50', wickDownColor: '#f44336',
                    });
                    // Convert history to chart format
                    const chartData = value.history.map(h => ({
                        time: h.date,  // expects 'YYYY-MM-DD'
                        open: h.o,
                        high: h.h,
                        low: h.l,
                        close: h.c,
                    }));
                    candlestickSeries.setData(chartData);
                    chart.timeScale().fitContent();
                } else {
                    chartDiv.innerText = 'No historical data';
                }
            }
        }
        loadData();

        // Resize charts on window resize
        window.addEventListener('resize', () => {
            // Simple reload for demo; in production you'd resize each chart
            loadData();
        });
    </script>
</body>
</html>
